name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"

jobs:
  rust:
    name: Rust (fmt / check / test / clippy / audit)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        working-directory: rust
        run: |
          rustup show
          rustup component add rustfmt clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Install Rust security tooling
        run: cargo install cargo-audit --locked

      - name: Run Rust CI
        run: bash ./scripts/ci-rust.sh

      - name: Upload Rust evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-ci-log
          path: rust/evidence/rust-ci.log
          if-no-files-found: ignore

  python:
    name: Python ${{ matrix.python-version }} (test / lint / security)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install libsodium
        run: |
          sudo apt-get update
          sudo apt-get install -y libsodium-dev

      - name: Run Python CI
        run: bash ./scripts/ci-python.sh

      - name: Upload Python evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-ci-log-${{ matrix.python-version }}
          path: python/evidence/python-ci.log
          if-no-files-found: ignore

  c:
    name: C (build / tests / static analysis / sanitizers)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CC: gcc
      REQUIRE_SANITIZERS: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install C build and analysis dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang cppcheck pkg-config libsodium-dev

      - name: Run C CI
        run: bash ./scripts/ci-c.sh

      - name: Upload C evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: c-ci-log
          path: c/evidence/c-ci.log
          if-no-files-found: ignore

  release-qualification:
    name: Release qualification (interop / security)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [rust, python, c]
    env:
      CC: gcc
      REQUIRE_SANITIZERS: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        working-directory: rust
        run: |
          rustup show
          rustup component add rustfmt clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Install Rust security tooling
        run: cargo install cargo-audit --locked

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install C build and analysis dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang cppcheck pkg-config libsodium-dev

      - name: Run release qualification
        run: bash ./scripts/ci-release-qualification.sh

      - name: Upload release qualification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-qualification-evidence
          path: |
            evidence/release-qualification/**
            rust/evidence/**
            python/evidence/**
            c/evidence/**
          if-no-files-found: ignore

  ci-complete:
    name: CI complete
    runs-on: ubuntu-latest
    needs: [rust, python, c, release-qualification]
    if: always()
    steps:
      - name: Check required jobs
        run: |
          if [ "${{ needs.rust.result }}" != "success" ]; then
            echo "Rust CI failed: ${{ needs.rust.result }}" >&2
            exit 1
          fi
          if [ "${{ needs.python.result }}" != "success" ]; then
            echo "Python CI failed: ${{ needs.python.result }}" >&2
            exit 1
          fi
          if [ "${{ needs.c.result }}" != "success" ]; then
            echo "C CI failed: ${{ needs.c.result }}" >&2
            exit 1
          fi
          if [ "${{ needs.release-qualification.result }}" != "success" ]; then
            echo "Release qualification failed: ${{ needs.release-qualification.result }}" >&2
            exit 1
          fi
          echo "All CI lanes and release qualification passed."
