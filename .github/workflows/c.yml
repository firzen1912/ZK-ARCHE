name: C CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: c-${{ github.ref }}
  cancel-in-progress: true

jobs:
  c:
    name: c (build / tests / ASan / UBSan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libsodium-dev

      - name: Run C CI
        run: ./scripts/ci-c.sh

      - name: Upload CI log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: c-ci-log
          path: c/evidence/c-ci.log
          if-no-files-found: ignore
